name: ⟦ Ω ⟧ Field Update

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  update-field:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Ω Field Reader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node omega-field.mjs

      - name: Commit updated README
        run: |
          git config user.name  "omega-field[bot]"
          git config user.email "omega@snapkittywest.github.io"
          git add README.md
          git diff --staged --quiet || git commit -m "⟦Ω⟧ field update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
